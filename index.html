<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <title>Search Quest</title>
        <style>
            /* Reset CSS: Please avoid making changes here unless you know what you're doing :) */
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
    
            html, body {
                width: 100%;
                height: 100%;
                /* Use dynamic viewport height for mobile browsers */
                height: 100dvh;
                height: 100vh; /* Fallback for browsers that don't support dvh */
            }
    
            body {
                line-height: 1;
                font-family: Arial, sans-serif;
                background-color: #f3f4f6;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 8px;
                gap: 8px;
                overflow: hidden;
                /* Use 92% of viewport to leave room for browser UI */
                max-height: 92dvh;
                max-height: 92vh; /* Fallback */
                height: 92dvh;
                height: 92vh; /* Fallback */
            }
    
            ol, ul {
                list-style: none;
            }
    
            img, video {
                max-width: 100%;
                height: auto;
                display: block;
            }
    
            a {
                text-decoration: none;
                color: inherit;
            }

            .game-container {
                width: 100%;
                max-width: 100%;
                border-radius: 24px;
                overflow: hidden;
                box-shadow: 0 18px 45px rgba(15, 23, 42, 0.35);
                background-color: #ffffff;
                flex-shrink: 0;
                position: relative;
            }

            #game-container {
                width: 100%;
                max-width: 100%;
                min-height: 300px;
                /* Use percentage of viewport to ensure it fits */
                max-height: calc(92dvh - 116px); /* 92% viewport minus bottom bar (100px) + gap (8px) + padding (8px) */
                max-height: calc(92vh - 116px); /* Fallback */
            }

            #bottom-bar-container {
                min-height: 100px;
                height: 100px;
                display: flex;
                flex-direction: column;
                padding: 12px;
                position: relative;
                border-top: 4px solid #e5e7eb; /* Progress bar background at top */
            }
            
            #progress-bar-fill {
                position: absolute;
                top: 0;
                left: 0;
                height: 4px;
                background-color: #22c55e;
                width: 0%;
                transition: width 0.2s ease;
            }
            
            /* Hide scrollbar for gallery */
            #object-gallery-wrapper::-webkit-scrollbar {
                display: none;
            }
            
            #object-gallery-wrapper {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }

            #bottom-bar-content {
                width: 100%;
                height: 100%;
            }
        </style>
    </head>
    <body>
        <div id="game-container" class="game-container"></div>
        <div id="bottom-bar-container" class="game-container">
            <div id="bottom-bar-content"></div>
        </div>
        <script src="./phaser.js"></script>
        <script type="module" src="./src/main.js"></script>
    </body>
    </html>
