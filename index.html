<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <title>Search Quest</title>
        <style>
            :root {
                --safe-area-inset-top: env(safe-area-inset-top, 0px);
                --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
            }
            /* Reset CSS: Please avoid making changes here unless you know what you're doing :) */
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
    
            html {
                width: 100%;
                height: 100%;
                /* Use dynamic viewport height for mobile browsers */
                height: 100dvh;
                height: 100vh; /* Fallback for browsers that don't support dvh */
                overflow: hidden;
                display: flex;
                justify-content: center;
                align-items: flex-start;
                background-color: #E5E5E5;
            }
    
            body {
                line-height: 1;
                font-family: Arial, sans-serif;
                background-color: transparent;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                padding: 0;
                padding-top: max(8px, var(--safe-area-inset-top));
                padding-bottom: max(8px, var(--safe-area-inset-bottom));
                gap: 6px;
                overflow: hidden;
                /* Use 85% of viewport height and 90% of viewport width */
                height: 85dvh;
                height: 85vh; /* Fallback */
                max-height: 85dvh;
                max-height: 85vh; /* Fallback */
                width: 90vw;
                max-width: 90vw;
            }
            
    
            ol, ul {
                list-style: none;
            }
    
            img, video {
                max-width: 100%;
                height: auto;
                display: block;
            }
    
            a {
                text-decoration: none;
                color: inherit;
            }

            .game-container {
                width: 100%;
                max-width: 100%;
                border-radius: 24px;
                overflow: hidden;
                background-color: #ffffff;
                flex-shrink: 0;
                position: relative;
            }

            #game-container {
                width: 100%;
                max-width: 100%;
                min-height: 300px;
                flex: 1 1 auto;
                overflow: hidden;
            }
            
            #gallery-container {
                min-height: 80px;
                height: 80px;
                max-height: 80px;
                display: flex;
                flex-direction: column;
                padding: 12px;
                position: relative;
                flex-shrink: 0;
            }
            
            #ad-container {
                min-height: 50px;
                height: 50px;
                max-height: 50px;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 8px;
                background-color: #f3f4f6;
                border-radius: 8px;
                flex-shrink: 0;
            }
            
            #ad-placeholder {
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border-radius: 4px;
                color: #ffffff;
                font-size: 12px;
                font-weight: bold;
                text-align: center;
            }
            
            /* Hide scrollbar for gallery */
            #object-gallery-wrapper::-webkit-scrollbar {
                display: none;
            }
            
            #object-gallery-wrapper {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }

            #gallery-content {
                width: 100%;
                height: 100%;
            }
        </style>
    </head>
    <body>
        <div id="game-container" class="game-container"></div>
        <div id="gallery-container" class="game-container">
            <div id="gallery-content"></div>
        </div>
        <div id="ad-container">
            <div id="ad-placeholder">Banner Ad</div>
        </div>
        <script src="./phaser.js"></script>
        <script type="module" src="./src/main.js"></script>
    </body>
    </html>
