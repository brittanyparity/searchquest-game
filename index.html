<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <title>Search Quest</title>
        <style>
            :root {
                --safe-area-inset-top: env(safe-area-inset-top, 0px);
                --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
            }
            /* Reset CSS: Please avoid making changes here unless you know what you're doing :) */
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
    
            html {
                width: 100%;
                height: 100%;
                /* Use dynamic viewport height for mobile browsers */
                height: 100dvh;
                height: 100vh; /* Fallback for browsers that don't support dvh */
                overflow: hidden;
                display: flex;
                justify-content: center;
                align-items: flex-start;
                background-color: #ffffff;
            }
    
            body {
                line-height: 1;
                font-family: Arial, sans-serif;
                background-color: #ffffff;
                display: flex;
                flex-direction: row; /* Changed to row for sidebar layout */
                align-items: center;
                justify-content: center;
                padding: 0;
                padding-top: max(8px, var(--safe-area-inset-top));
                padding-bottom: max(8px, var(--safe-area-inset-bottom));
                padding-left: max(8px, var(--safe-area-inset-left));
                padding-right: max(8px, var(--safe-area-inset-right));
                gap: 6px;
                overflow: hidden;
                /* Use 85% of viewport height and 90% of viewport width */
                height: 85dvh;
                height: 85vh; /* Fallback */
                max-height: 85dvh;
                max-height: 85vh; /* Fallback */
                width: 90vw;
                max-width: 90vw;
            }
    
            ol, ul {
                list-style: none;
            }
    
            img, video {
                max-width: 100%;
                height: auto;
                display: block;
            }
    
            a {
                text-decoration: none;
                color: inherit;
            }

            .game-container {
                width: 100%;
                max-width: 100%;
                border-radius: 24px;
                overflow: hidden;
                box-shadow: 0 18px 45px rgba(15, 23, 42, 0.35);
                background-color: #ffffff;
                flex-shrink: 0;
                position: relative;
            }

            #game-container {
                /* Width and height will be set dynamically to match image dimensions */
                min-width: 300px;
                min-height: 300px;
                flex: 0 0 auto; /* Don't grow or shrink, use fixed size */
                overflow: hidden;
            }

            #bottom-bar-container {
                /* Can be used as sidebar (vertical) or bottom bar (horizontal) */
                /* Hidden for now - will be shown when user confirms sidebar layout */
                display: none;
                
                /* Sidebar styles (when enabled) */
                min-width: 200px;
                width: 200px; /* Sidebar width */
                min-height: 100px;
                max-height: 100%;
                height: 100%;
                flex-direction: column;
                padding: 12px;
                position: relative;
                border-left: 4px solid #e5e7eb; /* Progress bar background on left for sidebar */
                flex-shrink: 0; /* Prevent sidebar from shrinking */
            }
            
            /* When sidebar is enabled, show it */
            #bottom-bar-container.sidebar-enabled {
                display: flex;
            }
            
            #progress-bar-fill {
                position: absolute;
                top: 0;
                left: 0;
                height: 4px;
                background-color: #22c55e;
                width: 0%;
                transition: width 0.2s ease;
            }
            
            /* Hide scrollbar for gallery */
            #object-gallery-wrapper::-webkit-scrollbar {
                display: none;
            }
            
            #object-gallery-wrapper {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }

            #bottom-bar-content {
                width: 100%;
                height: 100%;
            }
        </style>
    </head>
    <body>
        <div id="game-container" class="game-container"></div>
        <div id="bottom-bar-container" class="game-container">
            <div id="bottom-bar-content"></div>
        </div>
        <script src="./phaser.js"></script>
        <script type="module" src="./src/main.js"></script>
    </body>
    </html>
