<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <title>Search Quest</title>
        <style>
            :root {
                --safe-area-inset-top: env(safe-area-inset-top, 0px);
                --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
                --safe-area-inset-left: env(safe-area-inset-left, 0px);
                --safe-area-inset-right: env(safe-area-inset-right, 0px);
            }
            /* Reset CSS: Please avoid making changes here unless you know what you're doing :) */
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
    
            html {
                width: 100%;
                height: 100%;
                height: 100dvh;
                height: 100vh;
                overflow: hidden;
                display: flex;
                justify-content: center;
                align-items: flex-start;
                background-color: #E5E5E5;
            }
    
            body {
                line-height: 1;
                font-family: Arial, sans-serif;
                background-color: transparent;
                display: flex;
                flex-direction: column;
                align-items: stretch;
                justify-content: flex-start;
                padding: 0;
                padding-top: max(0px, var(--safe-area-inset-top));
                padding-bottom: max(58px, calc(50px + 8px + var(--safe-area-inset-bottom)));
                padding-left: var(--safe-area-inset-left);
                padding-right: var(--safe-area-inset-right);
                gap: 0;
                overflow: hidden;
                height: 85dvh;
                height: 85vh;
                max-height: 85dvh;
                max-height: 85vh;
                width: 100%;
                max-width: 100%;
            }
            
    
            ol, ul {
                list-style: none;
            }
    
            img, video {
                max-width: 100%;
                height: auto;
                display: block;
            }
    
            a {
                text-decoration: none;
                color: inherit;
            }

            #play-section {
                width: 100%;
                flex: 1 1 auto;
                min-height: 0;
                display: flex;
                flex-direction: column;
                background-color: #ffffff;
                overflow: hidden;
            }

            .game-container {
                width: 100%;
                max-width: 100%;
                border-radius: 0;
                overflow: hidden;
                background-color: #ffffff;
                flex-shrink: 0;
                position: relative;
            }

            #game-top-bar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-shrink: 0;
                min-height: 48px;
                padding: 8px 12px;
                gap: 8px;
                background-color: #ffffff;
                border-bottom: 1px solid #e5e7eb;
                z-index: 20;
            }

            .top-bar-side {
                flex: 1;
                min-width: 0;
                display: flex;
                align-items: center;
            }

            .top-bar-side--left {
                justify-content: flex-start;
            }

            .top-bar-side--right {
                justify-content: flex-end;
            }

            #top-bar-back {
                width: 44px;
                height: 40px;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background-color: rgba(243, 244, 246, 0.95);
                color: #1f2937;
                border: none;
                border-radius: 10px;
                font-size: 20px;
                line-height: 1;
                cursor: pointer;
                transition: transform 0.1s ease, background-color 0.15s ease;
            }

            #top-bar-back:active {
                transform: scale(0.96);
            }

            #game-top-bar-title {
                flex: 0 1 auto;
                max-width: 42%;
                text-align: center;
                font-size: 17px;
                font-weight: 700;
                color: #111827;
                letter-spacing: 0.02em;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                padding: 0 4px;
            }

            #game-container {
                width: 100%;
                max-width: 100%;
                flex: 1 1 auto;
                min-height: 0;
                overflow: hidden;
            }
            
            #gallery-container {
                min-height: 0;
                display: flex;
                flex-direction: column;
                padding: 0;
                position: relative;
                flex-shrink: 0;
                border-top: none;
                background-color: #ffffff;
            }

            #gallery-stats-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
                padding: 10px 14px 8px;
                flex-shrink: 0;
                border-top: 1px solid #e5e7eb;
                background-color: #f9fafb;
            }

            #timer-display {
                font-variant-numeric: tabular-nums;
                font-size: 15px;
                font-weight: 700;
                color: #1f2937;
                min-width: 52px;
            }

            #attempts-display {
                flex: 1;
                text-align: center;
                font-size: 15px;
                font-weight: 700;
                color: #374151;
                transition: color 0.15s ease, transform 0.15s ease;
            }

            #attempts-display.life-lost-flash {
                color: #dc2626;
                animation: attempts-shake 0.45s ease;
            }

            @keyframes attempts-shake {
                0%, 100% { transform: translateX(0); }
                20% { transform: translateX(-6px); }
                40% { transform: translateX(6px); }
                60% { transform: translateX(-4px); }
                80% { transform: translateX(4px); }
            }

            #hint-button {
                width: 44px;
                height: 44px;
                flex-shrink: 0;
                background-color: #10b981;
                color: #ffffff;
                border: none;
                border-radius: 12px;
                font-size: 22px;
                cursor: pointer;
                box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
                transition: transform 0.1s ease, box-shadow 0.1s ease;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #hint-button:active {
                transform: scale(0.96);
            }
            
            #ad-container {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100vw;
                min-height: 50px;
                height: 50px;
                max-height: 50px;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 8px;
                background-color: #f3f4f6;
                flex-shrink: 0;
                z-index: 100;
            }
            
            #ad-placeholder {
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border-radius: 4px;
                color: #ffffff;
                font-size: 12px;
                font-weight: bold;
                text-align: center;
            }
            
            #object-gallery-wrapper::-webkit-scrollbar {
                display: none;
            }
            
            #object-gallery-wrapper {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }

            #gallery-content {
                width: 100%;
                flex: 1 1 auto;
                min-height: 72px;
                padding: 0 12px 12px;
            }
            
            #gallery-title {
                font-family: Arial, sans-serif;
                font-size: 15px;
                font-weight: bold;
                color: #1f2937;
                text-align: center;
                padding: 0 12px 8px;
                flex-shrink: 0;
            }

            #wrong-tap-flash {
                pointer-events: none;
                position: fixed;
                inset: 0;
                z-index: 50;
                background: rgba(220, 38, 38, 0.22);
                opacity: 0;
                transition: opacity 0.08s ease-out;
            }

            #wrong-tap-flash.visible {
                opacity: 1;
            }
        </style>
    </head>
    <body>
        <div id="wrong-tap-flash" aria-hidden="true"></div>
        <div id="play-section">
            <header id="game-top-bar">
                <div class="top-bar-side top-bar-side--left">
                    <button type="button" id="top-bar-back" aria-label="Back">←</button>
                </div>
                <h1 id="game-top-bar-title">Search Quest</h1>
                <div class="top-bar-side top-bar-side--right" id="top-bar-settings-slot"></div>
            </header>
            <div id="game-container" class="game-container"></div>
        </div>
        <div id="gallery-container" class="game-container">
            <div id="gallery-stats-row">
                <span id="timer-display">01:00</span>
                <span id="attempts-display">♥ 3/3</span>
                <button type="button" id="hint-button" aria-label="Hint">💡</button>
            </div>
            <div id="gallery-title">FIND THE OBJECTS · 0/5</div>
            <div id="gallery-content"></div>
        </div>
        <div id="ad-container">
            <div id="ad-placeholder">Banner Ad</div>
        </div>
        <script src="./phaser.js"></script>
        <script type="module" src="./src/main.js"></script>
    </body>
    </html>
